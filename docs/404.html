<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="8; url=/" />
    <meta name="robots" content="noindex" />
    <title>Didaskalos | Page not found</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .not-found {
        width: min(720px, 100%);
        padding: 32px;
        text-align: center;
      }

      .not-found p {
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <main class="section not-found">
      <p class="eyebrow">404</p>
      <h1 class="section-heading">This page moved or does not exist.</h1>
      <p>
        The site is built for GitHub Pages, so missing routes fall back to this
        page and then return home automatically.
      </p>
      <div class="actions" style="justify-content: center">
        <a class="button button-primary" href="index.html">Go back home</a>
        <a class="button button-secondary" href="README.md">Read the notes</a>
      </div>
    </main>
  </body>
</html>
